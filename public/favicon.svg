<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="carGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="2" dy="5" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#ffffff" stroke="#2563eb" stroke-width="10"/>
  
  <g transform="translate(0, 50)" filter="url(#shadow)">
      <!-- Car Body -->
      <path d="M60,280 
               L80,240 
               C90,230 140,225 150,225
               L200,210 
               L320,210 
               C350,210 380,230 400,240 
               L420,250 
               L440,270 
               L450,300 
               L450,340 
               L430,350 
               L60,350 
               Z" 
            fill="url(#carGradient)" />
      
      <!-- Cabin/Windows -->
      <path d="M160,225 
               L210,180 
               L330,180 
               L370,230 
               Z" 
            fill="#1e293b" />
            
      <!-- Side Window Highlight -->
      <path d="M215,190 L320,190 L355,225 L165,225 Z" fill="#94a3b8" opacity="0.8" />
      
      <!-- Wheels -->
      <circle cx="130" cy="350" r="45" fill="#1e293b" stroke="#94a3b8" stroke-width="5" />
      <circle cx="130" cy="350" r="20" fill="#475569" />
      
      <circle cx="380" cy="350" r="48" fill="#1e293b" stroke="#94a3b8" stroke-width="5" />
      <circle cx="380" cy="350" r="22" fill="#475569" />
      
      <!-- Speed lines -->
      <path d="M460,280 L500,280" stroke="#2563eb" stroke-width="5" stroke-linecap="round" />
      <path d="M470,300 L510,300" stroke="#2563eb" stroke-width="5" stroke-linecap="round" />
      <path d="M460,320 L490,320" stroke="#2563eb" stroke-width="5" stroke-linecap="round" />
  </g>
  
  <!-- Text -->
  <text x="50%" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="60" fill="#1e3a8a">PREMIUM</text>
</svg>
